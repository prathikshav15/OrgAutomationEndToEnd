# override_config_example.yaml
# Copy this to override_config.yaml and fill in your values.
# override_config.yaml is git-ignored — never commit real credentials.

# ─── Datastreams ──────────────────────────────────────────────────────────────
datastreams:
  crm_contacts:
    name: "CRM_Contacts_Stream"
    type: "CRM"
    dataSpaceName: "default"

# ─── DMOs ─────────────────────────────────────────────────────────────────────
dmos:
  contact_dmo:
    developerName: "Contact_Unified"
    label: "Contact Unified"
    category: "Profile"
    dataSpaceName: "default"

# ─── Segments ─────────────────────────────────────────────────────────────────
segments:
  segment1:
    developerName: "sample_test_segment"
    description: "sample segment"
  segment2:
    developerName: "sample_test_segment_2"
    description: "sample segment 2"

# ─── Targets ──────────────────────────────────────────────────────────────────
targets:
  target1:
    name: "test_target_1"
    description: "test target"
    connector:
      bucketName: "YOUR_S3_BUCKET_NAME"
      accessKey: "YOUR_AWS_ACCESS_KEY"
      secretKey: "YOUR_AWS_SECRET_KEY"

# ─── Activations ──────────────────────────────────────────────────────────────
activations:
  activation1:
    name: "Activation_1"
    activationTargetName: "test_target_1"
    segmentApiName: "test"
    refreshType: "FULL_REFRESH"

# ─── Connectors ───────────────────────────────────────────────────────────────
connectors:
  SFTPConnector:
    name: SFTP_Connector_1
    connectorType: SFTP
    label: Secure File Transfer (SFTP) 1
    method: Egress
    credentials:
      - paramName: user
        value: YOUR_SFTP_USERNAME
      - paramName: password
        value: YOUR_SFTP_PASSWORD
    parameters:
      - paramName: remoteHost
        value: YOUR_SFTP_HOST
      - paramName: parentDirectory
        value: /sftp-output
      - paramName: remotePort
        value: "22"
