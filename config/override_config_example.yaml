# override_config_example.yaml
# Copy this to override_config.yaml and fill in your values.
# override_config.yaml is git-ignored — never commit real credentials.
#
# Payloads sourced from d360-mcp-server payload-examples.json (v66.0)
# Endpoints: {instance_url}/services/data/v66.0/ssot/...

# ─── Datastreams ──────────────────────────────────────────────────────────────
# POST /services/data/v66.0/ssot/data-streams
# Profile: no eventDateColumn needed
# Engagement: MUST set eventDateColumn to an immutable DateTime (e.g. CreatedDate)
#             DO NOT use LastModifiedDate — breaks time-series partitioning
datastreams:
  # ── Example: CSV file upload (Engagement / transaction data) ──────────────
  # Use UploadedFiles connector for CSV files.
  # category: "Engagement" requires eventDateColumn pointing to an immutable DateTime field.
  # refreshMode: "TOTAL_REPLACE" replaces all rows on every re-upload.
  # Field names map 1-to-1 from the CSV header row.
  transaction_stream:
    label: "Transaction Data Stream"
    name: "Transaction_Data"
    connectorInfo:
      connectorType: "UploadedFiles"
      connectorDetails:
        name: "UploadedFiles"
    dataLakeObjectInfo:
      category: "Engagement"
      eventDateColumn: "date_time_stamp"   # immutable DateTime → used for time-series partitioning
      dataLakeFieldInfoRepresentation:
        - name: "unique_transaction_id"
          dataType: "Text"
          label: "Unique Transaction ID"
          isPrimaryKey: true
        - name: "email_address"
          dataType: "Text"
          label: "Email Address"
          isPrimaryKey: false
        - name: "date_time_stamp"
          dataType: "DateTime"
          label: "Transaction Date"
          isPrimaryKey: false
        - name: "product_id"
          dataType: "Text"
          label: "Product ID"
          isPrimaryKey: false
        - name: "product_name"
          dataType: "Text"
          label: "Product Name"
          isPrimaryKey: false
        - name: "vendor_id"
          dataType: "Text"
          label: "Vendor ID"
          isPrimaryKey: false
        - name: "vendor_name"
          dataType: "Text"
          label: "Vendor Name"
          isPrimaryKey: false
        - name: "vendor_state"
          dataType: "Text"
          label: "Vendor State"
          isPrimaryKey: false
        - name: "vendor_city"
          dataType: "Text"
          label: "Vendor City"
          isPrimaryKey: false
        - name: "purchase_price"
          dataType: "Number"
          label: "Purchase Price"
          isPrimaryKey: false
    advancedAttributes:
      fileType: "CSV"
      delimiter: ","
      fileName: "transactions.csv"
    refreshConfig:
      hasHeaders: true
      refreshMode: "TOTAL_REPLACE"
      isAccelerationEnabled: false
      shouldFetchImmediately: false
      shouldTreatMissingFilesAsFailures: false
      frequency:
        frequencyType: "BATCH"

  # ── Example: Salesforce CRM connector (Account object) ───────────────────
  account_stream:
    label: "Account Data Stream"
    connectorInfo:
      connectorType: "SalesforceDotCom"
      connectorDetails:
        sourceObject: "Account"
        name: "SalesforceDotCom_YOUR_ORG_ID"   # e.g. SalesforceDotCom_00DVF000004CYzh2AG
    dataLakeObjectInfo:
      category: "Profile"
      dataLakeFieldInfoRepresentation:
        - name: "Id"
          dataType: "Text"
          label: "Account ID"
          isPrimaryKey: true
        - name: "Name"
          dataType: "Text"
          label: "Account Name"
          isPrimaryKey: false
        - name: "Industry"
          dataType: "Text"
          label: "Industry"
          isPrimaryKey: false
        - name: "AnnualRevenue"
          dataType: "Number"
          label: "Annual Revenue"
          isPrimaryKey: false
        - name: "BillingCountry"
          dataType: "Text"
          label: "Billing Country"
          isPrimaryKey: false
        - name: "CreatedDate"
          dataType: "DateTime"
          label: "Created Date"
          isPrimaryKey: false
        - name: "LastModifiedDate"
          dataType: "DateTime"
          label: "Last Modified Date"
          isPrimaryKey: false

# ─── DMOs ─────────────────────────────────────────────────────────────────────
# POST /services/data/v66.0/ssot/data-model-objects
dmos:
  custom_metric_dmo:
    name: "CustomMetric__dlm"
    label: "Custom Metrics Object"
    objectType: "Custom"
    objectCategory: "Calculated"
    fields:
      - name: "Id__c"
        isPrimaryKey: true
        isRequired: true
        label: "ID"
        dataType: "Text"
      - name: "MetricName__c"
        label: "Metric Name"
        dataType: "Text"
        isRequired: true
      - name: "MetricValue__c"
        label: "Metric Value"
        dataType: "Number"
        precision: 18
        scale: 2
      - name: "CalculationDate__c"
        label: "Calculation Date"
        dataType: "DateTime"

# ─── DMO Mappings ─────────────────────────────────────────────────────────────
# POST /services/data/v66.0/ssot/data-model-object-mappings
# Run AFTER datastream is created — get the exact DLO name from the datastream response
# DLO field names always have __c suffix (Id__c, Name__c, etc.)
# IMPORTANT: dataspace is required — set it in the mapping config
dmo_mappings:
  account_to_ssot_account:
    sourceEntityDeveloperName: "Account_YOUR_ORG_ID__dll"   # from datastream response
    targetEntityDeveloperName: "ssot__Account__dlm"
    fieldMapping:
      - sourceFieldDeveloperName: "Id__c"
        targetFieldDeveloperName: "ssot__Id__c"
      - sourceFieldDeveloperName: "Name__c"
        targetFieldDeveloperName: "ssot__Name__c"
      - sourceFieldDeveloperName: "Industry__c"
        targetFieldDeveloperName: "ssot__Industry__c"
      - sourceFieldDeveloperName: "AnnualRevenue__c"
        targetFieldDeveloperName: "ssot__AnnualRevenue__c"
      - sourceFieldDeveloperName: "BillingCountry__c"
        targetFieldDeveloperName: "ssot__BillingCountry__c"

# ─── Segments ─────────────────────────────────────────────────────────────────
# POST /services/data/v66.0/ssot/segments
# segmentCreationFlow: "Datakit" is required
# Use includeDbt.models.models[].sql for SQL-based filtering
segments:
  high_value_customers:
    displayName: "High Value Customers"
    segmentOnApiName: "UnifiedIndividual__dlm"
    segmentType: "Ui"
    segmentCreationFlow: "Datakit"
    publishSchedule: "TwentyFour"
    publishScheduleStartDateTime: "2026-03-28T00:00:00.000Z"
    publishScheduleEndDate: "2027-03-28T00:00:00.000Z"
    description: "Customers with annual revenue > $100k in Technology or Finance"
    includeDbt:
      models:
        models:
          - name: "high_value_segment"
            sql: |
              SELECT DISTINCT
                individual.ssot__Id__c as individual_id
              FROM UnifiedIndividual__dlm as individual
              WHERE individual.AnnualRevenue__c > 100000
                AND individual.Industry__c IN ('Technology', 'Finance')
              ORDER BY individual.AnnualRevenue__c DESC

# ─── Targets ──────────────────────────────────────────────────────────────────
# POST /services/data/v66.0/ssot/activation-targets
targets:
  target1:
    name: "test_target_1"
    description: "Test S3 activation target"
    platformType: "AmazonS3"
    isCappingEnabled: false
    dataSpaceName: "default"
    connector:
      bucketName: "YOUR_S3_BUCKET_NAME"
      folderName: "cdp-output/"
      accessKey: "YOUR_AWS_ACCESS_KEY"
      secretKey: "YOUR_AWS_SECRET_KEY"

# ─── Activations ──────────────────────────────────────────────────────────────
# POST /services/data/v66.0/ssot/activations
activations:
  activation1:
    name: "Send High Value Customers to S3"
    segmentApiName: "high_value_customers"
    activationTargetName: "test_target_1"
    refreshType: "FULL"
    dataSpaceName: "default"
    activationTargetSubjectConfig:
      developerName: "ssot__Individual__dlm"
    attributesConfig:
      attributes:
        - dataSourceType: "Text"
          entityName: "ssot__Individual__dlm"
          label: "Individual Id"
          name: "ssot__Id__c"
          queryPathConfig:
            configs: []
          referenceAttributeName: "Id"
          source: "DIRECT"
          type: "MODEL"
    shouldExcludeDeletes: false
    shouldExcludeUpdates: false

# ─── CSV Ingests ──────────────────────────────────────────────────────────────
# Uploads a local CSV file into the DLO created by the matching datastream.
# objectApiName: the DLO developer name (from the datastream response or d360_dlo_list)
# csvFilePath  : path to the CSV file on your local machine
# operation    : "upsert" (default) | "insert" | "delete"
csv_ingests:
  transaction_upload:
    objectApiName: "Transaction_Data_YOUR_ORG_ID__dll"   # replace with real DLO name
    csvFilePath: "data/transactions.csv"                  # relative or absolute path
    operation: "upsert"

# ─── Connectors ───────────────────────────────────────────────────────────────
connectors:
  SFTPConnector:
    name: SFTP_Connector_1
    connectorType: SFTP
    label: Secure File Transfer (SFTP) 1
    method: Egress
    credentials:
      - paramName: user
        value: YOUR_SFTP_USERNAME
      - paramName: password
        value: YOUR_SFTP_PASSWORD
    parameters:
      - paramName: remoteHost
        value: YOUR_SFTP_HOST
      - paramName: parentDirectory
        value: /sftp-output
      - paramName: remotePort
        value: "22"
