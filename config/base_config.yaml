# config/base_config.yaml
# Default configurations for all entity types.
# Override specific fields in config/override_config.yaml

defaults:
  api_version: "v66.0"
  dataspace_name: "default"

# ─── Datastreams ──────────────────────────────────────────────────────────────
# Correct fields per d360-mcp-server (v66.0):
#   dataAccessMode: "INGEST"
#   connectorInfo.connectorType: e.g. "SalesforceDotCom" | "Snowflake" | "S3"
#   refreshConfig.refreshMode: "UPSERT" | "TOTAL_REPLACE"
#   refreshConfig.frequency.frequencyType: "BATCH" | "STREAMING"
datastreams:
  base:
    dataSpaceName: "default"
    dataAccessMode: "INGEST"
    refreshConfig:
      frequency:
        frequencyType: "BATCH"
      refreshMode: "UPSERT"

# ─── DMOs ─────────────────────────────────────────────────────────────────────
# Correct fields per d360-mcp-server (v66.0):
#   objectType: "Custom" | "Standard"
#   objectCategory: "Profile" | "Engagement" | "Other" | "Calculated"
dmos:
  base:
    dataSpaceName: "default"
    objectType: "Custom"
    objectCategory: "Profile"

# ─── Segments ─────────────────────────────────────────────────────────────────
# Correct fields per d360-mcp-server (v66.0):
#   segmentType: "Ui"  (case-sensitive — was "UI")
#   publishSchedule: "TwentyFour" | "Weekly" | "None"
#   segmentOnApiName: the DMO to segment on
segments:
  base:
    segmentType: "Ui"
    segmentOnApiName: "UnifiedIndividual__dlm"
    publishSchedule: "TwentyFour"
    description: "Default segment"

# ─── Targets ──────────────────────────────────────────────────────────────────
targets:
  base:
    platformType: "AmazonS3"
    isCappingEnabled: false
    description: "Default target description"
    connector:
      bucketName: "your-bucket-name"
      folderName: "default/folder/"
    dataSpaceName: "default"

# ─── Activations ──────────────────────────────────────────────────────────────
# Correct fields per d360-mcp-server (v66.0):
#   refreshType: "INCREMENTAL" | "FULL"  (not FULL_REFRESH)
activations:
  base:
    refreshType: "FULL"
    dataSpaceName: "default"
    activationTargetName: "test_target_1"
    name: "Activation_1"
    segmentApiName: "test"
    activationTargetSubjectConfig:
      developerName: "ssot__Individual__dlm"
    attributesConfig:
      attributes:
        - dataSourceType: "Text"
          entityName: "ssot__Individual__dlm"
          label: "Individual Id"
          name: "ssot__Id__c"
          queryPathConfig:
            configs: []
          referenceAttributeName: "Id"
          source: "DIRECT"
          type: "MODEL"
    shouldExcludeDeletes: false
    shouldExcludeUpdates: false
    staticDataConfig:
      staticData:
        - name: "Name 1"
          value: "Value 1"

# ─── Connectors ───────────────────────────────────────────────────────────────
connectors:
  base:
    name: SFTP_Connector
    connectorType: SFTP
    label: Secure File Transfer (SFTP)
    method: Egress
