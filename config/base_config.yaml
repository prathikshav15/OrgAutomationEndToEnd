# config/base_config.yaml
# Default configurations for all entity types.
# Payloads sourced from d360-mcp-server payload-examples.json (v66.0)
# Override specific fields in config/override_config.yaml

defaults:
  api_version: "v66.0"
  dataspace_name: "default"

# ─── Datastreams ──────────────────────────────────────────────────────────────
# POST /services/data/v66.0/ssot/data-streams
# Profile streams: no eventDateColumn needed
# Engagement streams: MUST set eventDateColumn to an immutable DateTime field (e.g. CreatedDate)
#   DO NOT use LastModifiedDate — it changes on updates and breaks time-series partitioning
datastreams:
  base:
    dataAccessMode: "INGEST"
    refreshConfig:
      frequency:
        frequencyType: "BATCH"
        hours: []
        refreshDayOfMonth: []
      refreshMode: "UPSERT"
      hasHeaders: false
      isAccelerationEnabled: false
      shouldFetchImmediately: false
      shouldTreatMissingFilesAsFailures: false

# ─── DMOs ─────────────────────────────────────────────────────────────────────
# POST /services/data/v66.0/ssot/data-model-objects
# objectType: "Custom" | "Standard"
# objectCategory: "Profile" | "Engagement" | "Other" | "Calculated"
dmos:
  base:
    objectType: "Custom"
    objectCategory: "Profile"

# ─── DMO Mappings ─────────────────────────────────────────────────────────────
# POST /services/data/v66.0/ssot/data-model-object-mappings
# Maps DLO fields → DMO fields so data flows from ingested streams into the model
# IMPORTANT: DLO field names include __c suffix (e.g. Id__c not Id)
# Use d360_dlo_get to get exact DLO field names after stream is created
dmo_mappings:
  base: {}

# ─── Segments ─────────────────────────────────────────────────────────────────
# POST /services/data/v66.0/ssot/segments
# segmentType: "Ui" (case-sensitive)
# publishSchedule: "TwentyFour" | "Weekly" | "None"
# segmentCreationFlow: "Datakit" (required per payload-examples.json)
segments:
  base:
    segmentType: "Ui"
    segmentCreationFlow: "Datakit"
    segmentOnApiName: "UnifiedIndividual__dlm"
    publishSchedule: "TwentyFour"
    description: "Default segment"

# ─── Targets ──────────────────────────────────────────────────────────────────
# POST /services/data/v66.0/ssot/activation-targets
targets:
  base:
    platformType: "AmazonS3"
    isCappingEnabled: false
    description: "Default target description"
    connector:
      bucketName: "your-bucket-name"
      folderName: "default/folder/"
    dataSpaceName: "default"

# ─── Activations ──────────────────────────────────────────────────────────────
# POST /services/data/v66.0/ssot/activations
# refreshType: "INCREMENTAL" | "FULL"
activations:
  base:
    refreshType: "FULL"
    dataSpaceName: "default"
    activationTargetSubjectConfig:
      developerName: "ssot__Individual__dlm"
    attributesConfig:
      attributes:
        - dataSourceType: "Text"
          entityName: "ssot__Individual__dlm"
          label: "Individual Id"
          name: "ssot__Id__c"
          queryPathConfig:
            configs: []
          referenceAttributeName: "Id"
          source: "DIRECT"
          type: "MODEL"
    shouldExcludeDeletes: false
    shouldExcludeUpdates: false

# ─── Connectors ───────────────────────────────────────────────────────────────
connectors:
  base:
    name: SFTP_Connector
    connectorType: SFTP
    label: Secure File Transfer (SFTP)
    method: Egress
